<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="32" height="32" role="img" aria-label="Waving hand">
  <title>Waving hand</title>
  <g transform="translate(20, 26)">
    <g>
      <text x="0" y="0" dominant-baseline="middle" text-anchor="middle" font-size="32" font-family="system-ui, Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif">👋</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 6 0; -6 0; 5 0; -5 0; 0 0" dur="0.5s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
