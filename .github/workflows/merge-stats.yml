# Merges public stats from MERGED_GITHUB_USERS (comma-separated) into merged-stats.svg
name: Merged GitHub stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "scripts/generate_merged_stats.py"
      - ".github/workflows/merge-stats.yml"

permissions:
  contents: write

concurrency:
  group: merged-stats
  cancel-in-progress: true

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate merged-stats.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_STATS_TOKEN: ${{ secrets.MERGE_STATS_TOKEN }}
          MERGED_GITHUB_USERS: ${{ vars.MERGED_GITHUB_USERS }}
        run: python scripts/generate_merged_stats.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add merged-stats.svg
          if git diff --staged --quiet; then
            echo "No changes to merged-stats.svg"
          else
            git commit -m "chore: refresh merged GitHub stats SVG"
            git push
          fi
