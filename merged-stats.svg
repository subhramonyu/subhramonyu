<svg xmlns="http://www.w3.org/2000/svg" width="900" height="248" viewBox="0 0 900 248">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="45%" style="stop-color:#a371f7"/>
      <stop offset="100%" style="stop-color:#79c0ff"/>
    </linearGradient>
    <linearGradient id="gCommits" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eaf2ff"/><stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <linearGradient id="gPR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e7ff"/><stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <linearGradient id="gAct" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cfffdb"/><stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="gRepos" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d8f0ff"/><stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
    <linearGradient id="gStars" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f6ecff"/><stop offset="100%" style="stop-color:#d2a8ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect x="2" y="2" width="896" height="244" rx="18" ry="18" fill="url(#panel)" stroke="url(#borderGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="450.0" y="34" text-anchor="middle" fill="#f0f6fc"
        font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif"
        font-size="19" font-weight="700" letter-spacing="-0.02em">My Git activity</text>
  <text x="450.0" y="56" text-anchor="middle" fill="#8b949e"
        font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif"
        font-size="11">Semantic versioning in public · chaotic versioning in branches</text>
  <line x1="32" y1="68" x2="868" y2="68" stroke="#30363d" stroke-width="1" stroke-linecap="round"/>

  <g font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
    
    <g transform="translate(150,0)" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
      <text y="108" fill="url(#gCommits)" font-size="36" font-weight="750">192</text>
      <text y="134" fill="#c9d1d9" font-size="12" font-weight="600">Commits</text>
      <text y="148" fill="#7d8590" font-size="9.5">GitHub-counted · 365d</text>
    </g>
    
    <g transform="translate(450,0)" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
      <text y="108" fill="url(#gPR)" font-size="36" font-weight="750">66</text>
      <text y="134" fill="#c9d1d9" font-size="12" font-weight="600">Pull requests</text>
      <text y="148" fill="#7d8590" font-size="9.5">authored · same window</text>
    </g>
    
    <g transform="translate(750,0)" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
      <text y="112" fill="url(#gAct)" font-size="28" font-weight="750">263</text>
      <text y="134" fill="#c9d1d9" font-size="12" font-weight="600">Total activity</text>
      <text y="148" fill="#7d8590" font-size="9.5">graph total (issues, reviews, …)</text>
    </g>
  </g>

  <line x1="48" y1="158" x2="852" y2="158" stroke="#21262d" stroke-width="1"/>

  <g font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
    
    <g transform="translate(300,0)" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
      <text y="176" fill="url(#gRepos)" font-size="30" font-weight="750">34</text>
      <text y="196" fill="#c9d1d9" font-size="12" font-weight="600">Public repositories</text>
      <text y="210" fill="#7d8590" font-size="9.5">combined</text>
    </g>
    
    <g transform="translate(600,0)" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
      <text y="176" fill="url(#gStars)" font-size="30" font-weight="750">1</text>
      <text y="196" fill="#c9d1d9" font-size="12" font-weight="600">Stars</text>
      <text y="210" fill="#7d8590" font-size="9.5">owned non-fork repos</text>
    </g>
  </g>

  <text x="450.0" y="232" text-anchor="middle" fill="#8b949e"
        font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="9">
    GitHub Actions · public data · compiled with hope, linked with habit
  </text>
</svg>
