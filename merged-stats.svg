<svg xmlns="http://www.w3.org/2000/svg" width="900" height="224" viewBox="0 0 900 224">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="45%" style="stop-color:#a371f7"/>
      <stop offset="100%" style="stop-color:#79c0ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="2" y="2" width="896" height="220" rx="18" ry="18" fill="url(#panel)" stroke="url(#borderGrad)" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="34" text-anchor="middle" fill="#f0f6fc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="19" font-weight="700">My Git activity</text>
  <text x="450" y="56" text-anchor="middle" fill="#8b949e" font-family="ui-sans-serif,sans-serif" font-size="11">Run the Merged GitHub stats workflow to refresh</text>
</svg>
